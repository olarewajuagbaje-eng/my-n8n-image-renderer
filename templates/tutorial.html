<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tutorial Template</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_brand.css">
<style>
  .card {
    height: 100%;
    width: 100%;
    display: flex;
    flex-direction: column;
    padding: 85px 100px;
    background: radial-gradient(circle at 100% 0%, #1a241f 0%, var(--brand-bg) 60%);
    box-sizing: border-box;
    border-top: 8px solid {{ACCENT}};
    position: relative;
    overflow: hidden;
  }

  /* Subtle ambient glow in the top right corner */
  .card::before {
    content: "";
    position: absolute;
    top: -150px;
    right: -150px;
    width: 400px;
    height: 400px;
    background: {{ACCENT}};
    filter: blur(150px);
    opacity: 0.15;
    border-radius: 50%;
    z-index: 0;
  }

  .content-wrapper {
    z-index: 1;
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  .header-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 50px;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    font-family: var(--brand-font-display);
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: {{ACCENT}};
    background: rgba(255, 255, 255, 0.03);
    padding: 8px 16px;
    border-radius: 6px;
    border: 1px solid rgba(255, 255, 255, 0.05);
  }

  .date-tag {
    font-family: var(--brand-font-display);
    font-size: 15px;
    font-weight: 500;
    color: var(--brand-muted);
    letter-spacing: 0.05em;
  }

  h1 {
    font-size: 68px;
    font-weight: 700;
    line-height: 1.05;
    margin: 0 0 24px;
    max-width: 950px;
    letter-spacing: -0.02em;
    color: var(--brand-ink);
  }

  p.subtitle {
    font-family: var(--brand-font-body);
    font-size: 26px;
    font-weight: 400;
    line-height: 1.5;
    color: var(--brand-muted);
    max-width: 800px;
    margin: 0;
  }

  .author-badge {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-top: auto;
  }

  .author-avatar {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: #1a241f;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--brand-font-display);
    font-weight: 700;
    font-size: 20px;
    color: {{ACCENT}};
    border: 2px solid rgba(255, 255, 255, 0.05);
  }

  .author-info {
    display: flex;
    flex-direction: column;
  }

  .author-name {
    font-family: var(--brand-font-display);
    font-size: 24px;
    font-weight: 700;
    color: var(--brand-ink);
  }

  .author-title {
    font-family: var(--brand-font-body);
    font-size: 16px;
    color: var(--brand-muted);
    margin-top: 4px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="content-wrapper">
      <div class="header-row">
        <div class="eyebrow">{{ICON}} &nbsp; TUTORIAL</div>
        <div class="date-tag">March 2026</div>
      </div>
      
      <div>
        <h1>{{TITLE}}</h1>
        <p class="subtitle">{{SUBTITLE}}</p>
      </div>

      <div class="author-badge">
        <div class="author-avatar">AO</div>
        <div class="author-info">
          <span class="author-name">Agbaje Olarewaju</span>
          <span class="author-title">AI Automation Architect</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
