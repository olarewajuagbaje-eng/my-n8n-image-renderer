<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Premium Flyer Template</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#12100D;        /* warm charcoal, not blue-black */
    --paper:#F4EFE4;       /* warm ivory */
    --muted:#A79C89;       /* warm muted stone */
    --hairline:rgba(244,239,228,0.16);
    --hairline-strong:rgba(244,239,228,0.30);
  }

  *{ box-sizing:border-box; }

  body{
    margin:0; padding:0;
    width:1200px; height:675px;
    overflow:hidden;
    background:var(--ink);
    font-family:'Inter', sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  .card{
    position:relative;
    width:1200px; height:675px;
    background:
      radial-gradient(ellipse 900px 500px at 78% 8%, rgba(244,239,228,0.05), transparent 60%),
      radial-gradient(ellipse 700px 500px at 10% 100%, rgba(244,239,228,0.035), transparent 55%),
      var(--ink);
    overflow:hidden;
  }

  /* Fine film-grain texture \u2014 the one restrained "premium print" cue,
     kept low-opacity so it reads as tactile paper rather than noise. */
  .grain{
    position:absolute; inset:0;
    opacity:0.05;
    mix-blend-mode:overlay;
    pointer-events:none;
  }

  /* Outer + inner hairline frame, like a letterpress invitation or
     certificate edge \u2014 the layout's organizing device. */
  .frame-outer{
    position:absolute;
    top:26px; left:26px; right:26px; bottom:26px;
    border:1px solid var(--hairline);
  }
  .frame-inner{
    position:absolute;
    top:34px; left:34px; right:34px; bottom:34px;
    border:1px solid var(--hairline);
  }

  /* Corner registration ticks \u2014 a quiet print-house detail rather than
     a decorative flourish. */
  .tick{ position:absolute; width:22px; height:22px; }
  .tick::before, .tick::after{ content:""; position:absolute; background:{{ACCENT}}; }
  .tick::before{ width:22px; height:1px; }
  .tick::after{ width:1px; height:22px; }
  .tick.tl{ top:52px; left:52px; }
  .tick.tr{ top:52px; right:52px; }
  .tick.tr::before{ right:0; } .tick.tr::after{ right:0; }
  .tick.bl{ bottom:52px; left:52px; }
  .tick.bl::before{ bottom:0; } .tick.bl::after{ bottom:0; }
  .tick.br{ bottom:52px; right:52px; }
  .tick.br::before{ bottom:0; right:0; } .tick.br::after{ bottom:0; right:0; }

  .content{
    position:relative;
    z-index:2;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    padding:88px 96px 66px;
  }

  .kicker-row{
    display:flex;
    align-items:center;
    gap:18px;
  }
  .kicker{
    font-family:'Inter', sans-serif;
    font-size:13px;
    font-weight:600;
    letter-spacing:0.32em;
    text-transform:uppercase;
    color:{{ACCENT}};
    white-space:nowrap;
  }
  .kicker-rule{
    flex:1;
    height:1px;
    background:var(--hairline-strong);
  }

  .body-block{ max-width:920px; }

  h1{
    font-family:'Fraunces', serif;
    font-optical-sizing:auto;
    font-weight:600;
    font-size:64px;
    line-height:1.12;
    letter-spacing:-0.01em;
    color:var(--paper);
    margin:34px 0 30px;
  }

  .subtitle-row{
    display:flex;
    gap:26px;
    align-items:flex-start;
  }
  .subtitle-rule{
    flex:none;
    width:1px;
    align-self:stretch;
    background:{{ACCENT}};
    opacity:0.9;
  }
  p.subtitle{
    font-family:'Fraunces', serif;
    font-style:italic;
    font-weight:500;
    font-size:24px;
    line-height:1.55;
    color:var(--muted);
    margin:0;
    max-width:760px;
  }

  .signature-row{
    display:flex;
    align-items:center;
    gap:22px;
  }

  .seal{
    position:relative;
    width:66px; height:66px;
    border-radius:50%;
    border:1px solid var(--hairline-strong);
    display:flex; align-items:center; justify-content:center;
    flex:none;
  }
  .seal::before{
    content:"";
    position:absolute;
    top:6px; left:6px; right:6px; bottom:6px;
    border-radius:50%;
    border:1px solid var(--hairline);
  }
  .seal-initials{
    font-family:'Fraunces', serif;
    font-weight:500;
    font-size:20px;
    letter-spacing:0.04em;
    color:var(--paper);
  }

  .signature-divider{
    width:1px;
    height:40px;
    background:var(--hairline-strong);
  }

  .author-name{
    font-family:'Inter', sans-serif;
    font-size:16px;
    font-weight:600;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--paper);
  }
  .author-title{
    font-family:'Fraunces', serif;
    font-style:italic;
    font-weight:500;
    font-size:15px;
    color:var(--muted);
    margin-top:5px;
  }
</style>
</head>
<body>
  <div class="card">

    <svg class="grain" width="100%" height="100%">
      <filter id="n">
        <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/>
        <feColorMatrix type="saturate" values="0"/>
      </filter>
      <rect width="100%" height="100%" filter="url(#n)"/>
    </svg>

    <div class="frame-outer"></div>
    <div class="frame-inner"></div>
    <div class="tick tl"></div>
    <div class="tick tr"></div>
    <div class="tick bl"></div>
    <div class="tick br"></div>

    <div class="content">

      <div>
        <div class="kicker-row">
          <span class="kicker">{{ICON}}</span>
          <span class="kicker-rule"></span>
        </div>

        <div class="body-block">
          <h1>{{TITLE}}</h1>
          <div class="subtitle-row">
            <span class="subtitle-rule"></span>
            <p class="subtitle">{{SUBTITLE}}</p>
          </div>
        </div>
      </div>

      <div class="signature-row">
        <div class="seal"><span class="seal-initials">AO</span></div>
        <div class="signature-divider"></div>
        <div>
          <div class="author-name">Agbaje Olarewaju</div>
          <div class="author-title">AI Automation Architect</div>
        </div>
      </div>

    </div>
  </div>
</body>
</html>
